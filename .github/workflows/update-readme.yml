name: Update README From Dataset

on:
  push:
    branches: [main]
    paths:
      - 'data/tools.json'
      - 'schema/tools.schema.json'
      - 'scripts/generate-readme.mjs'
      - '.github/workflows/update-readme.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate README
        run: node scripts/generate-readme.mjs

      - name: Commit README if changed
        run: |
          if git diff --quiet README.md; then
            echo "README already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: regenerate README from tools dataset"
          git push
